<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÑATO TV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid #ed1c24; }
        video { width: 100%; height: 100%; }
        #search-box { padding: 10px; background: #111; }
        #search-box input { width: 95%; padding: 10px; border-radius: 20px; border: none; background: #222; color: white; display: block; margin: auto; }
        #lista-canales { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 15px; align-content: start; }
        .canal-card { background: #1a1a1a; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .canal-card img { width: 100%; height: 50px; object-fit: contain; }
        .canal-card p { font-size: 10px; margin: 5px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div id="player-container">
    <video id="video" controls autoplay crossorigin="anonymous"></video>
</div>

<div id="search-box">
    <input type="text" id="buscar" placeholder="Buscar canal..." onkeyup="filtrar()">
</div>

<div id="lista-canales">
    <p id="status">Cargando canales...</p>
</div>

<script>
    let player;
    let dataCanales = [];
    // ESTE ES EL LINK CORREGIDO
    const urlLista = 'https://gist.githubusercontent.com/datrinidad2188-code/c37dd47eb80a4b96ba2c7f9195ac7f4f/raw/02430eeeac10eeadc3d9a1c6a2588147d34b22c8/lista.m3u';

    async function init() {
        shaka.polyfill.installAll();
        player = new shaka.Player(document.getElementById('video'));
        
        try {
            const res = await fetch(urlLista);
            const data = await res.json();
            dataCanales = data;
            document.getElementById('status').remove();
            mostrar(dataCanales);
        } catch (e) {
            document.getElementById('status').innerText = "Error de conexión con la lista.";
        }
    }

    function mostrar(lista) {
        const cont = document.getElementById('lista-canales');
        cont.innerHTML = '';
        lista.forEach((c, index) => {
            const div = document.createElement('div');
            div.className = 'canal-card';
            div.innerHTML = `<img src="${c.logo}"><p>${c.nombre}</p>`;
            div.onclick = () => reproducir(c.url);
            cont.appendChild(div);
        });
    }

    async function reproducir(url) {
        try {
            await player.load(url);
            document.getElementById('player-container').scrollIntoView({behavior: 'smooth'});
        } catch (e) { alert("Señal caída temporalmente."); }
    }

    function filtrar() {
        const term = document.getElementById('buscar').value.toLowerCase();
        mostrar(dataCanales.filter(c => c.nombre.toLowerCase().includes(term)));
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
