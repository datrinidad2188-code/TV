<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÑATO TV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 3px solid #ed1c24; }
        video { width: 100%; height: 100%; }
        #search-box { padding: 10px; background: #111; text-align: center; }
        #search-box input { width: 90%; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #222; color: white; outline: none; }
        #lista-canales { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 15px; }
        .canal-card { background: #1a1a1a; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .canal-card:hover { border-color: #ed1c24; transform: scale(1.05); }
        .canal-card img { width: 100%; height: 55px; object-fit: contain; }
        .canal-card p { font-size: 11px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

    <div id="search-box">
        <input type="text" id="buscar" placeholder="Buscando en ÑATO TV PRO..." onkeyup="filtrar()">
    </div>

    <div id="lista-canales"></div>

    <script>
        let player;
        const video = document.getElementById('video');

        async function init() {
            shaka.polyfill.installAll();
            player = new shaka.Player(video);
            
            // CONFIGURACIÓN DE RED PARA "ENGAÑAR" AL SERVIDOR
            player.getNetworkingEngine().registerRequestFilter(function(type, request) {
                // Si el link es de sensa o colsecor, le mandamos los datos de la app oficial
                if (request.uris[0].includes('sensa') || request.uris[0].includes('colsecor')) {
                    request.headers['Referer'] = 'https://player.sensa.com.ar/';
                    request.headers['Origin'] = 'https://player.sensa.com.ar';
                }
            });

            player.addEventListener('error', (e) => console.error("Error Shaka:", e.detail.code));
            cargarLista();
        }

        async function cargarLista() {
            try {
                const res = await fetch('lista.m3u');
                const texto = await res.text();
                interpretarM3U(texto);
            } catch (e) { console.error("Fallo lista"); }
        }

        function interpretarM3U(m3u) {
            const contenedor = document.getElementById('lista-canales');
            contenedor.innerHTML = "";
            const bloques = m3u.split('#EXTINF');
            
            bloques.forEach((bloque, index) => {
                if (!bloque.includes('http')) return;
                
                let urlMatch = bloque.match(/https?:\/\/[^\s|]+/);
                let url = urlMatch ? urlMatch[0] : "";
                let nombre = bloque.split('\n')[0].split(',')[1] || "Canal";
                let logo = bloque.match(/tvg-logo="([^"]+)"/)?.[1] || "";
                
                const regexKeys = /([a-f0-9]{32}):([a-f0-9]{32})/i;
                const keys = bloque.match(regexKeys) || (bloques[index-1]?.match(regexKeys));

                const card = document.createElement('div');
                card.className = 'canal-card';
                card.innerHTML = `<img src="${logo}" onerror="this.src='https://via.placeholder.com/110x55?text=TV'"><p>${nombre.trim()}</p>`;
                
                card.onclick = () => reproducir(url, keys ? keys[1] : null, keys ? keys[2] : null);
                contenedor.appendChild(card);
            });
        }

        async function reproducir(url, id, key) {
            try {
                await player.unload();
                
                const config = {
                    drm: {
                        clearKeys: (id && key) ? { [id.trim()]: key.trim() } : {},
                        advanced: {
                            'org.w3.clearkey': { 'sessionType': 'temporary' }
                        }
                    }
                };

                await player.configure(config);
                await player.load(url);
                video.play();
            } catch (e) {
                console.error("Fallo:", e.code);
                // Si falla por licencia (3016) reintentamos sin llaves por si es un link libre
                if (e.code == 3016 && id) reproducir(url, null, null);
            }
        }

        function filtrar() {
            let val = document.getElementById('buscar').value.toUpperCase();
            let cards = document.getElementsByClassName('canal-card');
            for (let c of cards) {
                c.style.display = c.innerText.toUpperCase().includes(val) ? "" : "none";
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
