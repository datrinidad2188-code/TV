<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÑATO TV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.debug.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid #ed1c24; position: sticky; top: 0; }
        video { width: 100%; height: 100%; }
        #search-box { padding: 12px; background: #111; }
        #search-box input { width: 90%; padding: 12px; border-radius: 25px; border: 1px solid #333; background: #222; color: white; display: block; margin: auto; outline: none; }
        #lista-canales { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 15px; }
        .canal-card { background: #1a1a1a; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .canal-card:hover { border-color: #ed1c24; transform: scale(1.05); }
        .canal-card img { width: 100%; height: 55px; object-fit: contain; border-radius: 4px; }
        .canal-card p { font-size: 11px; margin-top: 8px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #status { text-align: center; margin-top: 20px; color: #888; }
    </style>
</head>
<body>

<div id="player-container">
    <video id="video" controls autoplay crossorigin="anonymous"></video>
</div>

<div id="search-box">
    <input type="text" id="buscar" placeholder="Buscar en ÑATO TV..." onkeyup="filtrar()">
</div>

<div id="lista-canales">
    <p id="status">Cargando grilla de canales...</p>
</div>

<script>
    let player;
    let dataCanales = [];
    // Usamos el archivo local de tu repositorio
    const urlLista = 'lista.m3u';

    async function init() {
        shaka.polyfill.installAll();
        const video = document.getElementById('video');
        player = new shaka.Player(video);

        try {
            const response = await fetch(urlLista);
            if (!response.ok) throw new Error('No se pudo leer la lista');
            
            // Leemos el contenido como texto primero
            const texto = await response.text();
            // Lo convertimos a objeto (JSON)
            dataCanales = JSON.parse(texto);
            
            const statusLabel = document.getElementById('status');
            if(statusLabel) statusLabel.remove();
            
            mostrar(dataCanales);
        } catch (e) {
            console.error(e);
            document.getElementById('status').innerText = "Error: Revisa que lista.m3u esté en la misma carpeta que index.html";
        }
    }

    function mostrar(lista) {
        const cont = document.getElementById('lista-canales');
        cont.innerHTML = '';
        lista.forEach(c => {
            const card = document.createElement('div');
            card.className = 'canal-card';
            card.innerHTML = `
                <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/100x60?text=TV'">
                <p>${c.nombre}</p>
            `;
            card.onclick = () => reproducir(c.url);
            cont.appendChild(card);
        });
    }

    async function reproducir(url) {
        try {
            await player.load(url);
            window.scrollTo({top: 0, behavior: 'smooth'});
        } catch (e) {
            alert("La señal no está disponible en este momento.");
        }
    }

    function filtrar() {
        const term = document.getElementById('buscar').value.toLowerCase();
        const filtrados = dataCanales.filter(c => c.nombre.toLowerCase().includes(term));
        mostrar(filtrados);
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
