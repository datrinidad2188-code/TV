<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÑATO TV PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; color: white; display: flex; flex-direction: column; height: 100vh; }
        #player-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        video { width: 100%; height: 100%; }
        #search-box { padding: 10px; background: #111; }
        #search-box input { width: 95%; padding: 8px; border-radius: 5px; border: none; }
        #lista-canales { flex-grow: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 10px; background: #050505; }
        .canal-card { background: #1a1a1a; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .canal-card:hover { border-color: #ed1c24; }
        .canal-card img { width: 100%; height: 50px; object-fit: contain; }
        .canal-card p { font-size: 11px; margin-top: 5px; height: 30px; overflow: hidden; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="video" controls autoplay crossorigin="anonymous"></video>
    </div>

    <div id="search-box">
        <input type="text" id="buscar" placeholder="Buscar canal..." onkeyup="filtrar()">
    </div>

    <div id="lista-canales" id="contenedor"></div>

    <script>
        let player;
        const video = document.getElementById('video');

        async function init() {
            player = new shaka.Player(video);
            cargarLista();
        }

        async function cargarLista() {
            // AQUÍ: Poné el nombre exacto de tu archivo m3u o la URL si la tenés subida
            const respuesta = await fetch('lista.m3u');
            const texto = await respuesta.text();
            interpretarM3U(texto);
        }

        function interpretarM3U(m3u) {
            const lineas = m3u.split('\n');
            const contenedor = document.getElementById('lista-canales');
            
            for (let i = 0; i < lineas.length; i++) {
                if (lineas[i].startsWith('#EXTINF')) {
                    const info = lineas[i];
                    const url = lineas[i + 4] ? lineas[i + 4].trim() : ''; // Ajusta según tu m3u
                    const drmInfo = lineas[i + 1] || ''; // Busca el KODIPROP
                    
                    // Extraer Nombre y Logo
                    const nombre = info.split(',')[1];
                    const logo = info.match(/tvg-logo="([^"]+)"/)?.[1] || '';
                    
                    // Extraer Llaves ClearKey
                    const keyData = drmInfo.match(/input_helper_last_ticks.*?(\w+):(\w+)/);
                    // O más simple buscando el formato ID:KEY
                    const keys = drmInfo.match(/([a-f0-9]{32}):([a-f0-9]{32})/);

                    if (url.includes('.mpd') && keys) {
                        const card = document.createElement('div');
                        card.className = 'canal-card';
                        card.innerHTML = `<img src="${logo}"><p>${nombre}</p>`;
                        card.onclick = () => reproducir(url, keys[1], keys[2]);
                        contenedor.appendChild(card);
                    }
                }
            }
        }

        async function reproducir(url, id, key) {
            try {
                await player.configure({ drm: { clearKeys: { [id]: key } } });
                await player.load(url);
                window.scrollTo(0,0);
            } catch (e) { console.error(e); }
        }

        function filtrar() {
            let input = document.getElementById('buscar').value.toUpperCase();
            let cards = document.getElementsByClassName('canal-card');
            for (let card of cards) {
                let txt = card.getElementsByTagName("p")[0].innerText;
                card.style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
